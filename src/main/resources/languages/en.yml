player-only: '<dark_red>[<red>ItemTag<dark_red>] <red>Command for Players only'
no-item-on-hand: '<dark_red>[<red>ItemTag<dark_red>] <red>You need to hold an item in hand'
lack-permission: '<dark_red>[<red>ItemTag<dark_red>] <red>You lack of permission %permission%'
lack-permission-generic: '<dark_red>[<red>ItemTag<dark_red>] <red>You don''t have permission to use this command'
itemtag:
  help-header: '<blue><bold>ItemTag - Help'
  flag:
    wrong-flag: '<dark_red>[<red>ItemTag<dark_red>] <red>Wrong Flag Value! <dark_red>[<gold>hover here<dark_red>]'
    description:
      - '<aqua><bold>Toggle Custom flags on the item'
      - ''
      - '<yellow><flag> <aqua>flag name'
      - '<yellow>[true/false] <aqua>flag value, by default toggle'
    params: '<flag> [true/false]'
    placeable:
      feedback:
        standard: '<blue>[<white>ItemTag<blue>] <green>The item can be placed.'
        custom: '<blue>[<white>ItemTag<blue>] <green>The item can''t be placed.'
        failed-place-attempt: '<dark_red>[<red>ItemTag<dark_red>] <red>You can''t place this item'
    usable:
      feedback:
        standard: '<blue>[<white>ItemTag<blue>] <green>The item can be used.'
        custom: '<blue>[<white>ItemTag<blue>] <green>The item can''t be used (Right click).'
    smelt:
      feedback:
        standard: '<blue>[<white>ItemTag<blue>] <green>The item can be cooked/smelt on furnaces.'
        custom: '<blue>[<white>ItemTag<blue>] <green>The item can''t be cooked/smelt on furnace.'
    furnacefuel:
      feedback:
        standard: '<blue>[<white>ItemTag<blue>] <green>The item can be used as furnace fuel.'
        custom: '<blue>[<white>ItemTag<blue>] <green>The item can''t be used as furnace fuel.'
    recipeingredient:
      feedback:
        standard: '<blue>[<white>ItemTag<blue>] <green>The item can be used as recipe ingredient.'
        custom: '<blue>[<white>ItemTag<blue>] <green>The item can''t be used as recipe ingredient.'
    enchantable:
      feedback:
        standard: '<blue>[<white>ItemTag<blue>] <green>The item can be enchanted.'
        custom: '<blue>[<white>ItemTag<blue>] <green>The item can''t be enchanted.'
    renamable:
      feedback:
        standard: '<blue>[<white>ItemTag<blue>] <green>The item can be used on anvils.'
        custom: '<blue>[<white>ItemTag<blue>] <green>The item can''t be used on anvils.'
    grindable:
      feedback:
        standard: '<blue>[<white>ItemTag<blue>] <green>The item can be disenchanted with grindstone.'
        custom: '<blue>[<white>ItemTag<blue>] <green>The item can''t be disenchanted with grindstone.'
    equipment:
      feedback:
        standard: '<blue>[<white>ItemTag<blue>] <green>The item can be equipped.'
        custom: '<blue>[<white>ItemTag<blue>] <green>The item can''t be equipped.'
    entityfood:
      feedback:
        standard: '<blue>[<white>ItemTag<blue>] <green>The item can be used as animal''s food.'
        custom: '<blue>[<white>ItemTag<blue>] <green>The item can''t be used as animal''s food.'
    clickmove:
      feedback:
        standard: '<blue>[<white>ItemTag<blue>] <green>The item can be moved on inventory.'
        custom: '<blue>[<white>ItemTag<blue>] <green>The item can''t be moved on inventory.'
    tradeable:
      feedback:
        standard: '<blue>[<white>ItemTag<blue>] <green>The item can be traded with villagers.'
        custom: '<blue>[<white>ItemTag<blue>] <green>The item can''t be traded with villagers.'
    smithing_table:
      feedback:
        standard: '<blue>[<white>ItemTag<blue>] <green>The item can be used as ingredient for smithing table.'
        custom: '<blue>[<white>ItemTag<blue>] <green>The item can''t be used as ingredient for smithing table.'
  actions:
    invalid-action:
      message: '<dark_red>[<red>ItemTag<dark_red>] <red>''<gold>%error%<red>'' is not a valid type <dark_red>[<gold>hover here<dark_red>]'
      hover-pre: '<gold><bold>Valid types'
      first_color: '<aqua>'
      second_color: '<yellow>'
    invalid-actioninfo:
      message: '<dark_red>[<red>ItemTag<dark_red>] <red>''<gold>%error%<red>'' is not a valid info for <gold>%action% <dark_red>[<gold>hover here<dark_red>]'
    description:
      - '<aqua><bold>Sets actions done when the item is used'
      - ''
      - '<yellow>Add <type> <action> <aqua>- add selected action'
      - '<yellow>Set <line> <type> <action> <aqua>- replace action on chosen line'
      - '<yellow>Remove <line> <aqua>- remove action on choosed line'
      - '<yellow>Clear <aqua>- remove all actions'
      - '<yellow>Permission [permission] <aqua>- set a required permission to use this item'
      - '<yellow>Cooldown <ms> <aqua>- set a cooldown to use this item again'
      - '<yellow>Cooldownid [id] <aqua>- set used cooldown id for this'
      - '<yellow>Cooldownmsg [msg] <aqua>- set the cooldown feedback'
      - '<yellow>Cooldownmsgtype [type] <aqua>- set the cooldown feedback type (chat or actionbar)'
      - '<yellow>Uses [amount] <aqua>- set how many times this item can be used'
      - '<yellow>Info <aqua>- show info abouth actions on current item'
    params: '[...]'
    add:
      params: 'add <type> <action>'
      description:
        - '<aqua><bold>Add selected action'
        - ''
        - '<yellow><type> <aqua>type of action'
        - '<yellow><action> <aqua>additional info for action'
      feedback: '<blue>[<white>ItemTag<blue>] <green>Added <yellow>%action%'
    addline:
      params: 'addline <line> <type> <action>'
      description:
        - '<aqua><bold>Add selected action on selected line'
        - ''
        - '<yellow><line> <aqua>line to add'
        - '<yellow><type> <aqua>type of action'
        - '<yellow><action> <aqua>additional info for action'
      feedback: '<blue>[<white>ItemTag<blue>] <green>Line <yellow>%line% <green>added as <yellow>%action%'
    set:
      params: 'set <line> <type> <action>'
      description:
        - '<aqua><bold>Replace action on selected line'
        - ''
        - '<yellow><line> <aqua>the line to replace'
        - '<yellow><type> <aqua>type of action'
        - '<yellow><action> <aqua>additional info for action'
      feedback: '<blue>[<white>ItemTag<blue>] <green>Line <yellow>%line% <green>set as <yellow>%action%'
    remove:
      params: 'remove <line>'
      description:
        - '<aqua><bold>Remove action on selected line'
        - ''
        - '<yellow><line> <aqua>the line to remove'
      feedback: '<blue>[<white>ItemTag<blue>] <green>Removed line <yellow>%line% <green>(<yellow>%action%<green>)'
    permission:
      params: 'permission [permission]'
      description:
        - '<aqua><bold>Set permission to use this item'
        - ''
        - '<yellow>[permission] <aqua>the permission to set, by default none'
      feedback:
        set: '<blue>[<white>ItemTag<blue>] <green>Permission <yellow>%permission% <green>is now required to use this item'
        removed: '<blue>[<white>ItemTag<blue>] <green>Now no permission is required to use this item'
    cooldown:
      params: 'cooldown [ms]'
      description:
        - '<aqua><bold>Set a cooldown to use an item again'
        - ''
        - '<yellow>[ms] <aqua>how much time before being able to use'
        - '     <aqua>the item again, by default 0'
        - '<aqua>Note: cooldown is set based on cooldownid, different'
        - '<aqua>  items with same cooldownid share same cooldown'
        - '<aqua>Note: cooldown is preserved on player logout and server restart'
      feedback:
        set: '<blue>[<white>ItemTag<blue>] <green>This item has a cooldown of <yellow>%cooldown_seconds% <green>seconds'
        removed: '<blue>[<white>ItemTag<blue>] <green>This item has no cooldown'
    cooldownid:
      params: 'cooldownid [id]'
      description:
        - '<aqua><bold>Set a cooldown id for an item'
        - ''
        - '<yellow>[id] <aqua>how much time before being able to use the item again'
        - '<aqua>Note: cooldown is set based on cooldownid, different'
        - '<aqua>  items with same cooldownid share same cooldown'
      feedback:
        set: '<blue>[<white>ItemTag<blue>] <green>This item use id <yellow>%id% <green>for cooldown'
        removed: '<blue>[<white>ItemTag<blue>] <green>This item use <yellow>default <green>id for cooldown'
    cooldownmsg:
      description:
        - '<aqua><bold>Set a cooldown message'
        - ''
        - '<yellow>[message] <aqua>the message to show when the item can''t be used'
        - '  <aqua>yet while the cooldown is active'
      params: 'cooldownmsg [message]'
      feedback:
        set: '<blue>[<white>ItemTag<blue>] <green>Feedback Message for cooldown set as ''<white>%msg%<green>'' when cooldown is active'
        removed: '<blue>[<white>ItemTag<blue>] <green>Feedback Message for cooldown removed'
    cooldownmsgtype:
      description:
        - '<aqua><bold>Set a cooldown message type'
        - ''
        - '<yellow>[type] <aqua>chat or actionbar'
      params: 'cooldownmsgtype [type]'
      feedback:
        set: '<blue>[<white>ItemTag<blue>] <green>Feedback Message for cooldown set as type ''<yellow>%type%<green>'''
    uses:
      params: 'uses [amount]'
      description:
        - '<aqua><bold>Set how many times the item can be used'
        - ''
        - '<aqua>Note: use <yellow>-1 <aqua>for unlimited uses'
      feedback:
        set: '<blue>[<white>ItemTag<blue>] <green>This item has <yellow>%uses% <green>uses before getting consumed'
        unlimited: '<blue>[<white>ItemTag<blue>] <green>This item has <yellow>unlimited <green>uses'
    maxuses:
      params: 'maxuses [amount]'
      description:
        - '<aqua><bold>Set max uses for the item'
        - '<aqua>Used mainly for aesthetic purposes with'
        - '<aqua>display uses as true'
        - ''
        - '<aqua>Note: use <yellow>-1 <aqua>for unlimited uses'
      feedback:
        set: '<blue>[<white>ItemTag<blue>] <green>This item has <yellow>%uses% <green>max uses'
        unlimited: '<blue>[<white>ItemTag<blue>] <green>This item has <yellow>unlimited <green>max uses'
    consume:
      params: 'consume [true/false]'
      description:
        - '<gold><bold>Consume the item on last use'
        - ''
        - '<aqua>Note: when true and the item consume'
        - '<aqua> it''s last use, the item is destroyed'
      feedback:
        set: '<blue>[<white>ItemTag<blue>] <green>Item is destroyed upon reaching his last use'
        unset: '<blue>[<white>ItemTag<blue>] <green>Item is not destroyed upon reaching his last use'
    visualcooldown:
      params: 'visualcooldown [true/false]'
      description:
        - '<gold><bold>Visual display cooldown time left'
        - ''
        - '<aqua>When true apply a cooldown effect similar to'
        - '<aqua>ender pearls cooldown to the item'
        - ''
        - '<aqua>Note: Unluckly this visual effect also'
        - '<aqua> applies to any item of same kind'
      feedback:
        set: '<blue>[<white>ItemTag<blue>] <green>Now item shows visual cooldown'
        unset: '<blue>[<white>ItemTag<blue>] <green>Now item won''t show visual cooldown'
    displayuses:
      params: 'displayuses [true/false]'
      description:
        - '<gold><bold>Display uses left'
        - ''
        - '<aqua>When true adds a line to describe'
        - '<aqua>how many uses are left'
        - ''
        - '<aqua>Note: Unluckly this visual effect also'
        - '<aqua> applies to any item of same kind'
      feedback:
        set: '<blue>[<white>ItemTag<blue>] <green>Now item shows uses left and max uses'
        unset: '<blue>[<white>ItemTag<blue>] <green>Now item won''t show uses left and max uses'
  activity:
    description:
      - '<aqua><bold>Sets an activity (some actions)'
      - '<aqua>an activity may be activated by triggers'
      - '<aqua>triggers may be associated to items (/it trigger)'
      - ''
      - '<yellow>Create <id> <aqua>- create a new activity'
      - '<yellow>Open <id> <aqua>- open a gui for selected activity'
      - '<yellow>Delete <id> <aqua>- delete selected activity'
      - '<yellow>Clone <id> <new id><aqua>- clone selected activity'
      - '<yellow>Rename <id> <new id><aqua>- rename selected activity'
    params: '[...]'
    feedback:
      invalid_activity_id: '<dark_red>[<red>ItemTag<dark_red>] <red>Activity <gold>%id% <red>doesn''t exist'
      already_used_activity_id: '<dark_red>[<red>ItemTag<dark_red>] <red>Activity <gold>%id% <red>is already used'
    create:
      params: 'create <new id>'
      description:
        - '<aqua><bold>Create a new activity'
        - ''
        - '<yellow><new id> <aqua>is the id of the activity'
        - "  <aqua>id must start with a letter and can be alphanumeric"
        - '  <aqua>may also contains _ symbol'
      feedback: '<blue>[<white>ItemTag<blue>] <green>Activity <yellow>%id% <green>created'
    rename:
      params: "rename <id> <new id>"
      description:
        - '<aqua><bold>Rename activity id'
        - ''
        - '<yellow><id> <aqua>is the current id of the activity'
        - '<yellow><new id> <aqua>is the new id of the activity'
        - "  <aqua>id must start with a letter and can be alphanumeric"
        - '  <aqua>may also contains _ symbol'
      feedback: '<blue>[<white>ItemTag<blue>] <green>Activity <yellow>%id% <green>renamed <yellow>%new_id%'
    open:
      params: "open <id>"
      description:
        - '<aqua><bold>Open a gui to edit the activity'
        - ''
        - '<yellow><id> <aqua>is the id of the activity'
    delete:
      params: "delete <id>"
      description:
        - '<aqua><bold>Delete selected activity'
        - ''
        - '<yellow><id> <aqua>is the id of the activity'
      feedback: '<blue>[<white>ItemTag<blue>] <green>Activity <yellow>%id% <green>deleted'
    clone:
      params: "clone <id> <clone id>"
      description:
        - '<aqua><bold>Clone selected activity'
        - ''
        - '<yellow><id> <aqua>is the id of the activity to clone'
        - '<yellow><clone id> <aqua>is the id of the clone'
        - "  <aqua>id must start with a letter and can be alphanumeric"
        - '  <aqua>may also contains _ symbol'
      feedback: '<blue>[<white>ItemTag<blue>] <green>Activity <yellow>%id% <green>cloned to <yellow>%clone_id%'
    setconsumes:
      params: "setconsumes <id> <amount>"
      description:
        - '<aqua><bold>Set uses required for selected activity'
        - ''
        - '<yellow><id> <aqua>is the id of the activity to clone'
        - '<yellow><amount> <aqua>amount of uses consumed by activity activation'
      feedback: '<blue>[<white>ItemTag<blue>] <green>Activity <yellow>%id% <green>uses consumption is <yellow>%amount%'
    addcondition:
      params: "addcondition <id> [!]<conditiontype> [condition info]"
      description:
        - '<aqua><bold>Add a condition to activate the activity'
        - ''
        - '<yellow><id> <aqua>is the id of the activity'
        - '<yellow>[!] <aqua>is the ''!'' if you want the condition to be reversed'
        - '<yellow><conditiontype> <aqua>is the type of condition'
        - '<yellow>[condition info] <aqua>is additional information the condition type may need'
      feedback: '<blue>[<white>ItemTag<blue>] <green>Activity <yellow>%id% <green>added condition <yellow>%condition%'
  consumeactions:
    description:
      - '<aqua><bold>Sets actions done when the item is consumed like food and drinks'
      - ''
      - '<yellow>Add <type> <action> <aqua>- add selected action'
      - '<yellow>Set <line> <type> <action> <aqua>- replace action on chosen line'
      - '<yellow>Remove <line> <aqua>- remove action on choosed line'
      - '<yellow>Clear <aqua>- remove all actions'
      - '<yellow>Permission [permission] <aqua>- set a required permission to consume this item'
      - '<yellow>Cooldown <ms> <aqua>- set a cooldown to use this item again'
      - '<yellow>Cooldownid [id] <aqua>- set used cooldown id for this'
      - '<yellow>Info <aqua>- show info abouth actions on current item'
    params: '[...]'
    add:
      params: 'add <type> <action>'
      description:
        - '<aqua><bold>Add selected action'
        - ''
        - '<yellow><type> <aqua>type of action'
        - '<yellow><action> <aqua>additional info for action'
    addline:
      params: 'addline <line> <type> <action>'
      description:
        - '<aqua><bold>Add selected action on selected line'
        - ''
        - '<yellow><line> <aqua>line to add'
        - '<yellow><type> <aqua>type of action'
        - '<yellow><action> <aqua>additional info for action'
    set:
      params: 'set <line> <type> <action>'
      description:
        - '<aqua><bold>Replace action on selected line'
        - ''
        - '<yellow><line> <aqua>the line to replace'
        - '<yellow><type> <aqua>type of action'
        - '<yellow><action> <aqua>additional info for action'
    remove:
      params: 'remove <line>'
      description:
        - '<aqua><bold>Remove action on selected line'
        - ''
        - '<yellow><line> <aqua>the line to remove'
    permission:
      params: 'permission [permission]'
      description:
        - '<aqua><bold>Set permission to consume this item'
        - ''
        - '<yellow>[permission] <aqua>the permission to set, by default none'
    cooldown:
      params: 'cooldown [ms]'
      description:
        - '<aqua><bold>Set a cooldown to consume an item again'
        - ''
        - '<yellow>[ms] <aqua>how much time before being able to consume'
        - '     <aqua>the item again, by default 0'
        - '<aqua>Note: cooldown is set based on cooldownid, different'
        - '<aqua>  items with same cooldownid share same cooldown'
        - '<aqua>Note: cooldown is preserved on player logout and server restart'
    cooldownid:
      params: 'cooldownid [id]'
      description:
        - '<aqua><bold>Set a cooldown id for an item'
        - ''
        - '<yellow>[id] <aqua>how much time before being able to consume the item again'
        - '<aqua>Note: cooldown is set based on cooldownid, different'
        - '<aqua>  items with same cooldownid share same cooldown'
    feedback:
      actions:
        set: '<green>Line <yellow>%line% <green>set as <yellow>%action%'
        remove: '<green>Removed line <yellow>%line% <green>(<yellow>%action%<green>)'
        clear: '<green>Cleared consume actions on this item'
        permission:
          set: '<green>Permission <yellow>%permission% <green>is now required to consume this item'
          removed: '<green>Now no permission is required to consume this item'
        cooldownid:
          set: '<green>This item use id <yellow>%id% <green>for cooldown'
          removed: '<green>This item use <yellow>default <green>id for cooldown'
        cooldown:
          set: '<green>This item has a cooldown of <yellow>%cooldown_seconds% <green>seconds'
          removed: '<green>This item has no cooldown'
  effects:
    description:
      - '<aqua><bold>Add Permanent potion effects'
      - '<aqua>Open a gui'
      - '<aqua>Remember to select which equipment'
      - '<aqua> slot apply the effect'
    params: ''
  usepermission:
    description:
      - '<aqua><bold>Set a permission to use this item (right click vanilla behavior)'
      - '<aqua>'
      - '<yellow>setpermission <permission> <aqua>set required permission'
      - '<yellow>setmessage <message> <aqua>set lack of permission message'
    params: '[...]'
    setpermission:
      feedback: "<green>Use permission is now set as <yellow>%value%"
      feedback-reset: "<green>Use required permission has been removed"
    setmessage:
      feedback: "<green>Use permission deny message is now set as <yellow>%value%"
      feedback-reset: "<green>Use permission deny message has been removed"
  wearpermission:
    description:
      - '<aqua><bold>Set a permission to wear this item'
      - '<aqua>Attempting to wear the item will drop'
      - '<aqua>it to inventory, or on floor if full'
      - '<aqua>'
      - '<yellow>setpermission <permission> <aqua>set required permission'
      - '<yellow>setmessage <message> <aqua>set lack of permission message'
    params: '[...]'
    setpermission:
      feedback: "<green>Wear permission is now set as <yellow>%value%"
      feedback-reset: "<green>Wear required permission has been removed"
    setmessage:
      feedback: "<green>Wear permission deny message is now set as <yellow>%value%"
      feedback-reset: "<green>Use permission deny message has been removed"
itemtagreload:
  success: '<blue>[<white>ItemTag<blue>] <green>Reloaded'
gui:
  middleclick: #middle click can't be used unless on creative mode, an alternative to middle click is pressing hotbar button 1
    creative: 'Middle Click'
    other: 'Press 1'
  previous-page:
    #Holders: %player_name% %page% %target_page%
    description:
      - '<gold><bold>Previous Page'
      - ''
      - '<gray>[<white>Click<gray>]<aqua> Go to page <yellow>%target_page%'
  next-page:
    #Holders: %player_name% %page% %target_page%
    description:
      - '<gold><bold>Next Page'
      - ''
      - '<gray>[<white>Click<gray>]<aqua> Go to page <yellow>%target_page%'
  back:
    #Holders: %player_name%
    description:
      - '<gold><bold>Go Back'
      - ''
      - '<gray>[<white>Click<gray>]<aqua> Go to previous gui'
  actions:
    title: '<blue>Actions'
    click-interact: '<blue>[<white>ItemTag<blue>] <aqua>[Click here]'
    click-hover: '<gold>Click to suggest command'
    addline:
      - '<gold><bold>Add Action'
      - ''
      - '<gray>[<white>Click<gray>]<aqua> Change values'
      - '<blue>/it actions add <action type> <action info>'
      - '<blue>/it actions addline <line> <action type> <action info>'
    set:
      - '<gold><bold>Set Action'
      - ''
      - '<gray>[<white>Click<gray>]<aqua> Change values'
      - '<blue>/it actions set <line> <action type> <action info>'
    remove:
      - '<gold><bold>Remove Action'
      - ''
      - '<gray>[<white>Click<gray>]<aqua> Change values'
      - '<blue>/it actions remove <line>'
    consume:
      - '<gold><bold>Consume on <yellow><bold>0<gold><bold> uses left'
      - '<aqua>Enabled: <yellow>%value%'
      - '<gray>Note: when true and the item consume'
      - '<gray> it''s last use, the item is destroyed'
      - ''
      - '<gray>[<white>Click<gray>]<aqua> Toggle'
      - '<blue>/it actions consume [true/false]'
    uses:
      - '<gold><bold>Available Uses <yellow><bold>%value%'
      - '<gray>(-1 for Unlimited)'
      - ''
      - '<gray>[<white>Right Click<gray>]<aqua> Add <yellow>%editor%'
      - '<gray>[<white>Left Click<gray>]<aqua> Remove <yellow>%editor%'
      - '<gray>[<white>Shift Left/Right Click<gray>]<aqua> %editor-prev% << <yellow>%editor% <aqua>>> %editor-next%'
      - '<blue>/it actions uses <amount>'
    maxuses:
      - '<gold><bold>Max Uses <yellow><bold>%value%'
      - '<gray>(-1 for Unlimited)'
      - '<gray>Mainly used for aesthetic purpose with Display Uses'
      - ''
      - '<gray>[<white>Right Click<gray>]<aqua> Add <yellow>%editor%'
      - '<gray>[<white>Left Click<gray>]<aqua> Remove <yellow>%editor%'
      - '<gray>[<white>Shift Left/Right Click<gray>]<aqua> %editor-prev% << <yellow>%editor% <aqua>>> %editor-next%'
      - '<blue>/it actions maxuses <amount>'
    permission:
      - '<gold><bold>Permission to use: <yellow><bold>%value%'
      - '<gray>Note: if you don''t have this permission'
      - '<gray> you won''t be able to use the item or'
      - '<gray> decrease it''s uses'
      - ''
      - '<gray>[<white>Click<gray>]<aqua> Edit'
      - '<blue>/it actions permission [permission]'
    cooldown:
      - '<gold><bold>Cooldown: <yellow><bold>%value_s% <blue>s'
      - '<gray>Note: apply a cooldown on right click uses'
      - ''
      - '<gray>[<white>Right Click<gray>]<aqua> Add <yellow>%editor%'
      - '<gray>[<white>Left Click<gray>]<aqua> Remove <yellow>%editor%'
      - '<gray>[<white>Shift Left/Right Click<gray>]<aqua> %editor-prev% << <yellow>%editor% <aqua>>> %editor-next%'
      - '<blue>/it actions cooldown <cooldown <u>ms</u>>'
    cooldownid:
      - '<gold><bold>Cooldown id: <yellow><bold>%value%'
      - '<gray>Note: all items with same cooldownid'
      - '<gray> shares the cooldown'
      - ''
      - '<gray>[<white>Click<gray>]<aqua> Edit'
      - '<blue>/it actions cooldownid [cooldown id]'
    info:
      - '<gold><bold>List of Actions:'
